<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lembrete - Seven Gold CRM</title>
  <style>
    body {
      background-color: #081026;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1d2f5a;
      padding-bottom: 12px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .title {
      font-size: 15px;
      font-weight: bold;
      color: #d4af37;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .label {
      font-size: 10px;
      color: #8a9fc4;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .value {
      font-size: 12.5px;
      background: rgba(29, 47, 90, 0.3);
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #1d2f5a;
      line-height: 1.4;
      color: #fff;
    }
    .footer {
      display: flex;
      gap: 8px;
      border-top: 1px solid #1d2f5a;
      padding-top: 16px;
      margin-top: 16px;
      flex-shrink: 0;
    }
    button {
      padding: 10px 16px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
      flex: 1;
      box-sizing: border-box;
    }
    .btn-close {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
    }
    .btn-action {
      background: #d4af37;
      border: 1px solid #d4af37;
      color: #081026;
    }
    .btn-wa {
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.4);
      color: #4caf50;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <div class="title" id="task-title">Lembrete Comercial</div>
  </div>

  <div class="content">
    <div class="field">
      <span class="label">Cliente</span>
      <div class="value" id="client-name">-</div>
    </div>
    <div class="field" id="wa-msg-field" style="display: none;">
      <span class="label">Mensagem WhatsApp</span>
      <div class="value" id="wa-message" style="white-space: pre-wrap;">-</div>
    </div>
    <div class="field" id="note-field">
      <span class="label">Anotação Interna</span>
      <div class="value" id="internal-note" style="white-space: pre-wrap;">-</div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-close" id="btn-close">Fechar</button>
    <button class="btn-wa" id="btn-wa" style="display: none;">WhatsApp</button>
    <button class="btn-action" id="btn-done">Marcar como feito</button>
  </div>

  <script src="alarm.js"></script>
</body>
</html>
